<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>БілімАI — Тест ЕНТ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1628;
  --bg3: #141d35;
  --surface: #1a2444;
  --surface2: #1f2b50;
  --border: rgba(99,179,237,0.15);
  --accent: #4f9cf9;
  --accent2: #7b5cf9;
  --accent3: #f97b4f;
  --gold: #f5c842;
  --green: #3ecf8e;
  --red: #f96060;
  --text: #e8eeff;
  --text2: #8da0c4;
  --text3: #4d6080;
  --r: 16px;
  --r2: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'Onest', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.4;
}

/* GRID BG */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(79,156,249,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,156,249,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
header {
  position: fixed;
  top:0; left:0; right:0;
  z-index:100;
  padding: 0 2rem;
  height: 72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background: rgba(10,14,26,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
  letter-spacing: -0.02em;
  cursor: pointer;
}

.logo span {
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-right {
  display:flex;
  align-items:center;
  gap: 1rem;
}

/* LANGUAGE SWITCHER */
.lang-switcher {
  display:flex;
  background: var(--surface);
  border-radius: 10px;
  padding: 3px;
  border: 1px solid var(--border);
  gap: 2px;
}

.lang-btn {
  padding: 5px 12px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Onest', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  border-radius: 7px;
  transition: all 0.2s;
}

.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

.nav-links {
  display:flex;
  gap: 0.5rem;
}

.nav-link {
  padding: 8px 16px;
  color: var(--text2);
  text-decoration: none;
  font-size: 0.9rem;
  border-radius: 10px;
  transition: all 0.2s;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Onest', sans-serif;
}

.nav-link:hover, .nav-link.active {
  color: var(--text);
  background: var(--surface);
}

select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  padding: 14px 32px;
  font-family: 'Onest', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  outline: none;
  cursor: pointer;
  transition: all 0.3s;
  appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
  background-position: right 12px center;
  background-repeat: no-repeat;
  background-size: 16px;
  padding-right: 40px;
}

select:hover { background-color: var(--surface2); border-color: var(--accent); }

select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,156,249,0.1); }

/* BUTTON STYLES */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  min-width: 140px;
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-family: 'Onest', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(79,156,249,0.2);
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
  opacity: 0;
  transition: opacity 0.3s;
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(79,156,249,0.35); }
.btn-primary:hover::before { background: rgba(255,255,255,0.08); }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  min-width: 140px;
  padding: 12px 24px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-family: 'Onest', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.btn-secondary:hover { background: var(--surface2); border-color: rgba(99,179,237,0.3); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

/* PAGES */
.page { display:none; position:relative; z-index:1; }
.page.active { display:block; }

/* =================== TEST PAGE =================== */
#page-test {
  min-height: 100vh;
  padding-top: 72px;
}

.test-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem;
}

.test-header {
  text-align:center;
  margin-bottom: 2rem;
}

.test-header h2 {
  font-family: 'Unbounded', sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.03em;
}

.test-header p {
  color: var(--text2);
  font-size: 1.1rem;
}

/* SETUP */
.test-setup {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 2rem;
  margin-bottom: 2rem;
}

.test-setup h3 {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

.subject-selector {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.subject-item {
  display:flex;
  align-items:center;
  gap: 0.75rem;
  padding: 1rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.3s;
}

.subject-item:hover {
  border-color: var(--accent);
  background: var(--surface);
}

.subject-item.active {
  border-color: var(--accent);
  background: rgba(79,156,249,0.1);
}

.subject-item-emoji {
  font-size: 1.5rem;
}

.subject-item-name {
  font-weight: 500;
}

.subject-item-count {
  margin-left:auto;
  color: var(--text2);
  font-size: 0.9rem;
}

/* ACTIVE TEST */
.test-active { display:none; }

.test-meta {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 1rem;
}

.test-counter {
  font-weight: 600;
  font-size: 1.1rem;
}

.test-timer {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.5rem 1rem;
}

.test-timer.warning {
  color: var(--red);
  background: rgba(249,96,96,0.1);
  border-color: rgba(249,96,96,0.2);
}

.test-progress-bar {
  width: 100%;
  height: 8px;
  background: var(--bg2);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 2rem;
}

.test-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width 0.3s;
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 2rem;
  margin-bottom: 2rem;
}

.question-subject-tag {
  display:inline-flex;
  align-items:center;
  gap: 0.5rem;
  background: rgba(79,156,249,0.1);
  border: 1px solid rgba(79,156,249,0.3);
  border-radius: 20px;
  padding: 0.5rem 1rem;
  font-size: 0.9rem;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 1.5rem;
}

.question-text {
  font-size: 1.2rem;
  line-height: 1.6;
  margin-bottom: 2rem;
}

.options-grid {
  display:grid;
  grid-template-columns: 1fr;
  gap: 1rem;
  margin-bottom: 2rem;
}

.option-btn {
  display:flex;
  align-items:center;
  gap: 1rem;
  padding: 1rem 1.5rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.3s;
  font-size: 1rem;
  text-align:left;
  color: var(--text);
}

.option-btn:hover {
  border-color: var(--accent);
  background: var(--surface);
}

.option-btn.correct {
  border-color: var(--green);
  background: rgba(62,207,142,0.1);
}

.option-btn.wrong {
  border-color: var(--red);
  background: rgba(249,96,96,0.1);
}

.option-letter {
  display:flex;
  align-items:center;
  justify-content:center;
  width: 32px;
  height: 32px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  font-weight: 600;
  flex-shrink:0;
}

.explanation-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.5rem;
  display:none;
}

.explanation-box.show {
  display:block;
}

.test-btn-row {
  display:flex;
  gap: 1rem;
  justify-content:center;
  margin-top: 2rem;
}

/* TEST RESULTS */
.test-results {
  display:none;
  text-align:center;
}

.result-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--bg2) 0);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin: 0 auto 2rem;
  position:relative;
}

.result-circle::before {
  content:'';
  position:absolute;
  inset: 8px;
  border-radius: 50%;
  background: var(--bg);
}

.result-score {
  font-family: 'Unbounded', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent);
  position:relative;
  z-index:1;
}

.result-total {
  font-size: 0.9rem;
  color: var(--text2);
  position:relative;
  z-index:1;
}

.result-grade {
  font-family: 'Unbounded', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 1rem;
}

.result-message {
  font-size: 1.1rem;
  color: var(--text2);
  margin-bottom: 2rem;
  max-width: 400px;
  margin-left:auto;
  margin-right:auto;
}

.result-details {
  display:flex;
  justify-content:center;
  gap: 2rem;
  margin-bottom: 2rem;
}

.result-detail-item {
  text-align:center;
}

.result-detail-num {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  display:block;
  margin-bottom: 0.25rem;
}

.result-detail-label {
  font-size: 0.9rem;
  color: var(--text2);
}
</style>
</head>

<header>

    <a href="chat.html" class="nav-link" id="nav-chat"><span data-i18n="nav_chat">Репетитор</span></a>
    <a href="test.html" class="nav-link active" id="nav-test"><span data-i18n="nav_test">Тест ЕНТ</span></a>
    <a href="progress.html" class="nav-link" id="nav-progress"><span data-i18n="nav_progress">Прогресс</span></a>
  </nav>
  <div class="header-right">
    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLang('kz')">ҚАЗ</button>
      <button class="lang-btn active" onclick="setLang('ru')">РУС</button>
      <button class="lang-btn" onclick="setLang('en')">ENG</button>
    </div>
  </div>
</header>

<div id="page-test" class="page active">
  <div class="test-container">
    <div class="test-header">
      <h2 data-i18n="test_title">🎯 Тест в формате ЕНТ</h2>
      <p data-i18n="test_sub" style="color:var(--text2)">Выбери предметы и начни тест</p>
    </div>

    <!-- SETUP -->
    <div class="test-setup" id="test-setup">
      <h3 data-i18n="test_choose_subjects">Выбери предметы</h3>
      <div class="subject-selector" id="subject-selector"></div>

      <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
        <div>
          <div style="font-size:0.85rem;color:var(--text2);margin-bottom:8px;" data-i18n="test_num_questions">Количество вопросов</div>
          <select id="q-count">
            <option value="10">10 вопросов</option>
            <option value="20" selected>20 вопросов</option>
            <option value="40">40 вопросов</option>
            <option value="120">120 вопросов (полный ЕНТ)</option>
          </select>
        </div>
        <button class="btn-primary" onclick="startTest()" style="margin-top:auto">
          🚀 <span data-i18n="btn_start">Начать тест</span>
        </button>
      </div>
    </div>

    <!-- ACTIVE TEST -->
    <div class="test-active" id="test-active">
      <div class="test-meta">
        <span class="test-counter" id="test-counter">Вопрос 1 из 20</span>
        <span class="test-timer" id="test-timer">40:00</span>
      </div>
      <div class="test-progress-bar">
        <div class="test-progress-fill" id="test-progress" style="width:0%"></div>
      </div>

      <div class="question-card" id="question-card">
        <div class="question-subject-tag" id="q-subject-tag">📐 Математика</div>
        <p class="question-text" id="question-text">Вопрос загружается...</p>
      </div>

      <div class="options-grid" id="options-grid"></div>

      <div class="explanation-box" id="explanation-box">
        <strong>💡 Объяснение:</strong> <span id="explanation-text"></span>
      </div>

      <div class="test-btn-row">
        <button class="btn-secondary" onclick="skipQuestion()" id="skip-btn" data-i18n="btn_skip">Пропустить</button>
        <button class="btn-primary" onclick="nextQuestion()" id="next-btn" style="display:none" data-i18n="btn_next">Следующий →</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div class="test-results" id="test-results">
      <div class="result-circle" id="result-circle">
        <span class="result-score" id="result-score">0</span>
        <span class="result-total" id="result-total">из 20</span>
      </div>
      <div class="result-grade" id="result-grade">🎯</div>
      <p class="result-message" id="result-message"></p>
      <div class="result-details">
        <div class="result-detail-item">
          <span class="result-detail-num" id="r-correct" style="color:var(--green)">0</span>
          <span class="result-detail-label" data-i18n="r_correct">Правильно</span>
        </div>
        <div class="result-detail-item">
          <span class="result-detail-num" id="r-wrong" style="color:var(--red)">0</span>
          <span class="result-detail-label" data-i18n="r_wrong">Неправильно</span>
        </div>
        <div class="result-detail-item">
          <span class="result-detail-num" id="r-skip" style="color:var(--gold)">0</span>
          <span class="result-detail-label" data-i18n="r_skip">Пропущено</span>
        </div>
      </div>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <button class="btn-primary" onclick="startTest()">🔄 <span data-i18n="btn_retry">Пройти ещё раз</span></button>
        <button class="btn-secondary" onclick="window.location.href='chat.html'">💬 <span data-i18n="btn_study_errors">Разобрать ошибки с AI</span></button>
      </div>
    </div>
  </div>
</div>

let testHistory = JSON.parse(localStorage.getItem('testHistory') || '[]');

// =================== API KEYS (alem.plus) ===================
const ALEM_API = {
  alemllm: { key: 'sk-O1GwtY734qQtiZw9YlRVCQ', url: 'https://llm.alem.ai/v1/chat/completions', model: 'alemllm' },
  kazllm: { key: 'sk-r-OVjlrI_QRGBC8BW9tKvw', url: 'https://llm.alem.ai/v1/chat/completions', model: 'kazllm' },
  stt: { key: 'sk-v-NTBaT--JFb8Q6eL4lgog', url: 'https://llm.alem.ai/v1/audio/transcriptions' },
  embedder: { key: 'sk-Cxa2F3WzR41rCC0Ww2iQOA', url: 'https://llm.alem.ai/v1/embeddings' }
};

// SUBJECTS
const SUBJECTS = [
  { id:'math', emoji:'📐', name:{ru:'Математика', kz:'Математика', en:'Mathematics'} },
  { id:'history', emoji:'📜', name:{ru:'История Казахстана', kz:'Қазақстан тарихы', en:'Kazakhstan History'} },
  { id:'biology', emoji:'🧬', name:{ru:'Биология', kz:'Биология', en:'Biology'} },
  { id:'chemistry', emoji:'⚗️', name:{ru:'Химия', kz:'Химия', en:'Chemistry'} },
  { id:'physics', emoji:'⚛️', name:{ru:'Физика', kz:'Физика', en:'Physics'} },
  { id:'geography', emoji:'🌍', name:{ru:'География', kz:'География', en:'Geography'} },
  { id:'kazakh', emoji:'🇰🇿', name:{ru:'Казахский язык', kz:'Қазақ тілі', en:'Kazakh Language'} },
  { id:'literature', emoji:'📚', name:{ru:'Литература', kz:'Әдебиет', en:'Literature'} }
];

// =================== LANG ===================
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['kz','ru','en'][i] === lang);
  });
  applyTranslations();
  renderSubjectSelector();
  // If test is active, re-render the current question
  if (document.getElementById('test-active').style.display === 'block') {
    renderQuestion();
  }
}

function applyTranslations() {
  const t = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
}

// =================== SUBJECT SELECTOR ===================
function renderSubjectSelector() {
  const container = document.getElementById('subject-selector');
  if (!container) return;
  container.innerHTML = SUBJECTS.map(s => `
    <div class="subject-item" onclick="toggleSubject('${s.id}')">
      <span class="subject-item-emoji">${s.emoji}</span>
      <span class="subject-item-name">${s.name[currentLang]}</span>
      <span class="subject-item-count">${(QUESTIONS_DB[s.id]||[]).length}</span>
    </div>
  `).join('');
}

let selectedSubjects = [];
function toggleSubject(id) {
  const el = event.target.closest('.subject-item');
  if (selectedSubjects.includes(id)) {
    selectedSubjects = selectedSubjects.filter(x => x !== id);
    el.classList.remove('active');
  } else {
    selectedSubjects.push(id);
    el.classList.add('active');
  }
}

function getSelectedSubjects() {
  return selectedSubjects;
}

// =================== TEST FUNCTIONS ===================
function startTest() {
  const selected = getSelectedSubjects();
  if (selected.length === 0) { alert(I18N[currentLang].select_subjects || 'Выбери хотя бы один предмет!'); return; }
  const count = parseInt(document.getElementById('q-count').value);
  let pool = [];
  selected.forEach(sid => { const qs = (QUESTIONS_DB[sid]||[]).map(q => ({...q, subject:sid})); pool = pool.concat(qs); });
  pool.sort(() => Math.random()-0.5);
  testQuestions = pool.slice(0, Math.min(count, pool.length));
  currentQIndex = 0; correctCount = 0; wrongCount = 0; skipCount = 0; answered = false;
  document.getElementById('test-setup').style.display = 'none';
  document.getElementById('test-active').style.display = 'block';
  document.getElementById('test-results').style.display = 'none';
  timeLeft = Math.min(count * 120, 2400);
  if (testTimer) clearInterval(testTimer);
  testTimer = setInterval(() => { timeLeft--; updateTimerDisplay(); if (timeLeft <= 0) finishTest(); }, 1000);
  renderQuestion();
}

function updateTimerDisplay() { 
  const timerEl = document.getElementById('test-timer');
  if (!timerEl) return;
  const mins = Math.floor(timeLeft/60).toString().padStart(2,'0'); 
  const secs = (timeLeft%60).toString().padStart(2,'0'); 
  timerEl.textContent = `${mins}:${secs}`; 
  timerEl.classList.toggle('warning', timeLeft < 120); 
}

function renderQuestion() {
  if (currentQIndex >= testQuestions.length) { finishTest(); return; }
  const q = testQuestions[currentQIndex];
  const s = SUBJECTS.find(x=>x.id===q.subject);
  answered = false;
  document.getElementById('explanation-box').classList.remove('show');
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('skip-btn').style.display = 'inline-flex';
  document.getElementById('test-counter').textContent = `${I18N[currentLang].question || 'Вопрос'} ${currentQIndex+1} / ${testQuestions.length}`;
  const pct = (currentQIndex/testQuestions.length*100).toFixed(0);
  document.getElementById('test-progress').style.width = pct+'%';
  document.getElementById('q-subject-tag').innerHTML = `${s.emoji} ${s.name[currentLang]}`;
  document.getElementById('question-text').textContent = q.q[currentLang];
  const letters = ['A','B','C','D','E'];
  const grid = document.getElementById('options-grid');
  grid.innerHTML = q.opts.map((opt,i) => `<button class="option-btn" onclick="selectAnswer(this,${i})"><span class="option-letter">${letters[i]}</span>${opt[currentLang]}</button>`).join('');
}

function selectAnswer(el, idx) {
  if (answered) return;
  answered = true;
  const q = testQuestions[currentQIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn,i) => { if (i === q.ans) btn.classList.add('correct'); else if (i === idx) btn.classList.add('wrong'); btn.style.pointerEvents = 'none'; });
  if (idx === q.ans) correctCount++; else wrongCount++;
  document.getElementById('explanation-text').textContent = q.exp[currentLang];
  document.getElementById('explanation-box').classList.add('show');
  document.getElementById('next-btn').style.display = 'inline-flex';
  document.getElementById('skip-btn').style.display = 'none';
}

function skipQuestion() { skipCount++; nextQuestion(); }
function nextQuestion() { currentQIndex++; if (currentQIndex >= testQuestions.length) finishTest(); else renderQuestion(); }

function finishTest() {
  if (testTimer) { clearInterval(testTimer); testTimer = null; }
  const total = testQuestions.length;
  const pct = total > 0 ? Math.round(correctCount/total*100) : 0;
  document.getElementById('test-active').style.display = 'none';
  document.getElementById('test-results').style.display = 'block';
  document.getElementById('result-score').textContent = correctCount;
  document.getElementById('result-total').textContent = `из ${total}`;
  document.getElementById('r-correct').textContent = correctCount;
  document.getElementById('r-wrong').textContent = wrongCount;
  document.getElementById('r-skip').textContent = skipCount;
  const circle = document.getElementById('result-circle');
  circle.style.setProperty('--pct', pct+'%');
  let grade, msg;
  if (pct >= 90) { grade = I18N[currentLang].excellent || '🏆 Отлично!'; msg = I18N[currentLang].great_result || 'Блестящий результат!'; }
  else if (pct >= 75) { grade = I18N[currentLang].good || '⭐ Хорошо!'; msg = I18N[currentLang].good_prep || 'Отличная подготовка!'; }
  else if (pct >= 60) { grade = I18N[currentLang].not_bad || '📈 Неплохо'; msg = I18N[currentLang].improve || 'Хороший результат, но есть что улучшить.'; }
  else if (pct >= 40) { grade = I18N[currentLang].study || '📚 Учись!'; msg = I18N[currentLang].more_practice || 'Нужно больше практики.'; }
  else { grade = I18N[currentLang].dont_give_up || '💪 Не сдавайся!'; msg = I18N[currentLang].start_basics || 'Начни с основ.'; }
  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-message').textContent = msg;
  const entry = { date: new Date().toLocaleDateString('ru-RU'), subjects: [...new Set(testQuestions.map(q=>q.subject))], correct: correctCount, total, pct, grade };
  testHistory.unshift(entry);
  if (testHistory.length > 20) testHistory = testHistory.slice(0,20);
  localStorage.setItem('testHistory', JSON.stringify(testHistory));
  document.getElementById('test-setup').style.display = 'block';
}

// =================== INIT ===================
window.addEventListener('DOMContentLoaded', () => {
  applyTranslations();
  renderSubjectSelector();
});
</script>
</body>
</html>
