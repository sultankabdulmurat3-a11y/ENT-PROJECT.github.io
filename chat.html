<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1628;
  --bg3: #141d35;
  --surface: #1a2444;
  --surface2: #1f2b50;
  --border: rgba(99,179,237,0.15);
  --accent: #4f9cf9;
  --accent2: #7b5cf9;
  --accent3: #f97b4f;
  --gold: #f5c842;
  --green: #3ecf8e;
  --red: #f96060;
  --text: #e8eeff;
  --text2: #8da0c4;
  --text3: #4d6080;
  --r: 16px;
  --r2: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'Onest', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.4;
}

/* GRID BG */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(79,156,249,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,156,249,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
header {
  position: fixed;
  top:0; left:0; right:0;
  z-index:100;
  padding: 0 2rem;
  height: 72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background: rgba(10,14,26,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
  letter-spacing: -0.02em;
  cursor: pointer;
}

.logo span {
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-right {
  display:flex;
  align-items:center;
  gap: 1rem;
}

/* LANGUAGE SWITCHER */
.lang-switcher {
  display:flex;
  background: var(--surface);
  border-radius: 10px;
  padding: 3px;
  border: 1px solid var(--border);
  gap: 2px;
}

.lang-btn {
  padding: 5px 12px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Onest', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  border-radius: 7px;
  transition: all 0.2s;
}

.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

.nav-links {
  display:flex;
  gap: 0.5rem;
}

.nav-link {
  padding: 8px 16px;
  color: var(--text2);
  text-decoration: none;
  font-size: 0.9rem;
  border-radius: 10px;
  transition: all 0.2s;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Onest', sans-serif;
}

.nav-link:hover, .nav-link.active {
  color: var(--text);
  background: var(--surface);
}

/* PAGES */
.page { display:none; position:relative; z-index:1; }
.page.active { display:block; }

/* =================== CHAT PAGE =================== */
#page-chat {
  min-height: 100vh;
  padding-top: 72px;
  display:flex;
}

.chat-sidebar {
  width: 300px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 2rem 1rem;
  overflow-y: auto;
}

.chat-sidebar h3 {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

@media (max-width: 860px) {
  #page-chat { display:block; }
  .chat-sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 0.6rem;
    max-height: 190px;
    min-height: 130px;
  }
  .chat-sidebar h3 {
    font-size: 1rem;
    margin-bottom: 0.8rem;
  }
  .chat-sidebar .subject-list {
    display: grid;
    grid-template-columns: repeat( auto-fill, minmax(120px, 1fr) );
    gap: 0.35rem;
    max-height: 130px;
    overflow-y: auto;
    padding-bottom: 0.2rem;
  }
  .subject-item {
    background: var(--bg2);
    border: 1px solid rgba(99,179,237,0.15);
    border-radius: 12px;
    padding: 0.5rem 0.55rem;
    gap: 0.5rem;
    justify-content: center;
    min-height: 34px;
    font-size: 0.78rem;
    line-height: 1.15;
  }
  .subject-item .subject-item-count { display: none; }
  .chat-main {
    width: 100%;
    padding: 0.8rem;
  }
  .chat-header {
    padding: 0.8rem;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .chat-subject-emoji { font-size: 1.5rem; }
  .chat-subject-name { font-size: 1.05rem; }
  .chat-messages {
    padding: 0.8rem;
    max-height: calc(100vh - 320px);
  }
  .chat-input-area {
    padding: 0.6rem;
    flex-direction: column;
    align-items: stretch;
    gap: 0.6rem;
  }
  .chat-input { min-height: 60px; font-size: 0.95rem; }
  .btn-send { width: 100%; padding: 0.75rem; font-size: 0.95rem; }
}

.subject-list {
  display:flex;
  flex-direction:column;
  gap: 0.5rem;
}

.subject-item {
  display:flex;
  align-items:center;
  gap: 0.75rem;
  padding: 0.75rem;
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.3s;
}

.subject-item:hover {
  background: var(--bg2);
}

.subject-item.active {
  background: rgba(79,156,249,0.1);
  border: 1px solid rgba(79,156,249,0.3);
}

.subject-item-emoji {
  font-size: 1.2rem;
}

.subject-item-name {
  font-weight: 500;
}

.subject-item-count {
  margin-left:auto;
  color: var(--text2);
  font-size: 0.8rem;
}

.chat-main {
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
  display:flex;
  align-items:center;
  gap: 1rem;
  flex-wrap: wrap;
}

.chat-subject-emoji {
  font-size: 2rem;
}

.chat-subject-name {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
}

.chat-messages {
  flex:1;
  padding: 2rem;
  overflow-y: auto;
  display:flex;
  flex-direction:column;
  gap: 1.5rem;
}

.message {
  display:flex;
  gap: 1rem;
  max-width: 80%;
}

.message.user {
  align-self:flex-end;
  flex-direction:row-reverse;
}

.message .avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 1.2rem;
  flex-shrink:0;
}

.message.ai .avatar {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.message.user .avatar {
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
}

.message .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 1rem 1.5rem;
  line-height: 1.6;
}

.message.user .content {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.chat-input-area {
  padding: 1.5rem 2rem;
  border-top: 1px solid var(--border);
  display:flex;
  gap: 1rem;
  align-items:flex-end;
}

.chat-input {
  flex:1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1rem 1.5rem;
  color: var(--text);
  font-family: 'Onest', sans-serif;
  font-size: 1rem;
  resize: none;
  min-height: 50px;
  max-height: 150px;
}

.chat-input:focus {
  outline: none;
  border-color: var(--accent);
}

.btn-send {
  padding: 1rem 1.5rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  font-family: 'Onest', sans-serif;
  font-weight: 600;
  transition: all 0.3s;
}

.btn-send:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(79,156,249,0.35);
}
</style>

</div>

// =================== LANG ===================
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['kz','ru','en'][i] === lang);
  });
  applyTranslations();
  renderSubjectList();
  updateChatSubjectHeader();
}

function applyTranslations() {
  const t = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
  const inp = document.getElementById('chat-input');
  if (inp) inp.placeholder = t.chat_placeholder || '';
}

// =================== CHAT FUNCTIONS ===================
function renderSubjectList() {
  const list = document.getElementById('subject-list');
  if (!list) return;
  list.innerHTML = SUBJECTS.map(s => `
    <div class="subject-item ${s.id===currentSubject?'active':''}" onclick="selectSubject('${s.id}')">
      <span class="subject-item-emoji">${s.emoji}</span>
      <span class="subject-item-name">${s.name[currentLang]}</span>
      <span class="subject-item-count">${(QUESTIONS_DB[s.id]||[]).length}</span>
    </div>
  `).join('');
}

function selectSubject(id) {
  currentSubject = id;
  messages = [];
  const container = document.getElementById('messages-container');
  if (container) container.innerHTML = '';
  renderSubjectList();
  updateChatSubjectHeader();
  const welcome = I18N[currentLang].chat_welcome || I18N.ru.chat_welcome;
  addMessage('ai', welcome);
}

function updateChatSubjectHeader() {
  const s = SUBJECTS.find(x=>x.id===currentSubject);
  if (!s) return;
  const emojiEl = document.getElementById('chat-subject-emoji');
  const nameEl = document.getElementById('chat-subject-name');
  if (emojiEl) emojiEl.textContent = s.emoji;
  if (nameEl) nameEl.textContent = s.name[currentLang];
}

function getApiKey() {
  return localStorage.getItem('OPENAI_API_KEY') || '';
}

function getLocalAiAnswer(text) {
  const base = {
    math: 'Для математики: попробуйте решить задачу по шагам, приведите формулы и получайте результат.',
    history: 'По истории: отметьте год, событие и ключевые личности.',
    biology: 'По биологии: рассмотрите структуру, функции и взаимосвязи.',
    chemistry: 'По химии: определите реакцию, условия и продукты.',
    physics: 'По физике: определите законы, формулы и приближённый расчёт.',
    geography: 'По географии: опишите регион, климат и экономику.',
    kazakh: 'По казахскому: проверьте грамматику и смысл.',
    literature: 'По литературе: проанализируйте тему, стиль и образ.',
  };
  const subj = base[currentSubject] || 'Пока нет данных по этому предмету.';
  return `${subj} (локальный AI ответ)`;
}

function addMessage(role, text) {
  messages.push({role, text});
  const container = document.getElementById('messages-container');
  if (!container) return;
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="content">${text}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  if (!input) return;

  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMessage('user', text);

  const subject = SUBJECTS.find(s => s.id === currentSubject);
  const subjectName = subject ? subject.name[currentLang] : '';

  const systemPrompt = `Ты БілімAI — AI-репетитор для подготовки к ЕНТ. Текущий предмет: ${subjectName}. Отвечай понятно и с примерами.`;

  const api = currentLang === 'kz' ? ALEM_API.kazllm : ALEM_API.alemllm;

  const historyMessages = messages.slice(-10).map(m => ({
    role: m.role === 'ai' ? 'assistant' : 'user',
    content: m.text
  }));

  const messagesPayload = [
    { role: 'system', content: systemPrompt },
    ...historyMessages
  ];

  // 👉 индикатор "печатает"
  addMessage('ai', '⏳ Печатает...');

  try {
    const response = await fetch(api.url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${api.key}`
      },
      body: JSON.stringify({
        model: api.model,
        messages: messagesPayload,
        max_tokens: 800,
        temperature: 0.7
      })
    });

    // ❗ ПРОВЕРКА ОШИБКИ
    if (!response.ok) {
      const errorText = await response.text();
      console.error('API ERROR:', response.status, errorText);
      throw new Error(`API error: ${response.status}`);
    }

    const data = await response.json();
    console.log('API RESPONSE:', data);

    // ❗ УМНАЯ ОБРАБОТКА ОТВЕТА
    let reply = '';

    if (data.choices && data.choices[0]?.message?.content) {
      reply = data.choices[0].message.content;
    } else if (data.content && data.content[0]?.text) {
      reply = data.content[0].text;
    } else if (data.message) {
      reply = data.message;
    } else {
      reply = '⚠️ Непонятный ответ от сервера';
      console.error('UNKNOWN FORMAT:', data);
    }

    // удалить "печатает"
    messages.pop();
    const container = document.getElementById('messages-container');
    if (container) container.lastChild?.remove();

    addMessage('ai', reply);

    chatSessionCount++;
    localStorage.setItem('chatSessions', chatSessionCount);

  } catch (err) {
    console.error('SEND ERROR:', err);

    // удалить "печатает"
    messages.pop();
    const container = document.getElementById('messages-container');
    if (container) container.lastChild?.remove();

    addMessage('ai', `❌ Ошибка: ${err.message}`);
  }
}
