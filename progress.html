<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1628;
  --bg3: #141d35;
  --surface: #1a2444;
  --surface2: #1f2b50;
  --border: rgba(99,179,237,0.15);
  --accent: #4f9cf9;
  --accent2: #7b5cf9;
  --accent3: #f97b4f;
  --gold: #f5c842;
  --green: #3ecf8e;
  --red: #f96060;
  --text: #e8eeff;
  --text2: #8da0c4;
  --text3: #4d6080;
  --r: 16px;
  --r2: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'Onest', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.4;
}

/* GRID BG */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(79,156,249,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,156,249,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
header {
  position: fixed;
  top:0; left:0; right:0;
  z-index:100;
  padding: 0 2rem;
  height: 72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background: rgba(10,14,26,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
  letter-spacing: -0.02em;
  cursor: pointer;
}

.logo span {
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-right {
  display:flex;
  align-items:center;
  gap: 1rem;
}

/* LANGUAGE SWITCHER */
.lang-switcher {
  display:flex;
  background: var(--surface);
  border-radius: 10px;
  padding: 3px;
  border: 1px solid var(--border);
  gap: 2px;
}

.lang-btn {
  padding: 5px 12px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Onest', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  border-radius: 7px;
  transition: all 0.2s;
}

.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

.nav-links {
  display:flex;
  gap: 0.5rem;
}

.nav-link {
  padding: 8px 16px;
  color: var(--text2);
  text-decoration: none;
  font-size: 0.9rem;
  border-radius: 10px;
  transition: all 0.2s;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: 'Onest', sans-serif;
}

.nav-link:hover, .nav-link.active {
  color: var(--text);
  background: var(--surface);
}

/* PAGES */
.page { display:none; position:relative; z-index:1; }
.page.active { display:block; }

/* =================== PROGRESS PAGE =================== */
#page-progress {
  min-height: 100vh;
  padding-top: 72px;
}

.progress-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
}

.progress-header {
  text-align:center;
  margin-bottom: 3rem;
}

.progress-header h2 {
  font-family: 'Unbounded', sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.03em;
}

.progress-header p {
  color: var(--text2);
  font-size: 1.1rem;
}

/* STATS CARDS */
.stats-cards {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 3rem;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 2rem;
  text-align:center;
  transition: all 0.3s;
}

.stat-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.stat-icon {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 2rem;
  margin: 0 auto 1rem;
  background: rgba(79,156,249,0.1);
}

.stat-num {
  font-family: 'Unbounded', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display:block;
  margin-bottom: 0.5rem;
}

.stat-label {
  font-size: 0.9rem;
  color: var(--text2);
  font-weight: 500;
}

/* PROGRESS BY SUBJECT */
.progress-by-subject {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 2rem;
  margin-bottom: 3rem;
}

.progress-by-subject h3 {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

.subject-progress-list {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1rem;
}

.subject-progress-item {
  display:flex;
  align-items:center;
  gap: 1rem;
  padding: 1rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  transition: all 0.3s;
}

.subject-progress-item:hover {
  border-color: var(--accent);
  background: var(--surface);
}

.subject-progress-emoji {
  font-size: 1.5rem;
}

.subject-progress-info {
  flex:1;
}

.subject-progress-name {
  font-weight: 500;
  margin-bottom: 0.5rem;
}

.subject-progress-bar-bg {
  width: 100%;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}

.subject-progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.3s;
}

.subject-progress-pct {
  font-size: 0.8rem;
  color: var(--text2);
}

/* TEST HISTORY */
.test-history-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 2rem;
}

.test-history-section h3 {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

.test-history-list {
  display:flex;
  flex-direction:column;
  gap: 1rem;
}

.history-item {
  display:flex;
  align-items:center;
  gap: 1rem;
  padding: 1rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  transition: all 0.3s;
}

.history-item:hover {
  border-color: var(--accent);
  background: var(--surface);
}

.history-emoji {
  font-size: 1.5rem;
}

.history-info {
  flex:1;
}

.history-name {
  font-weight: 500;
  margin-bottom: 0.25rem;
}

.history-date {
  font-size: 0.8rem;
  color: var(--text2);
}

.history-score {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
  min-width: 60px;
  text-align:center;
}

.history-score.good { background: rgba(62,207,142,0.2); color: var(--green); }
.history-score.mid { background: rgba(245,200,66,0.2); color: var(--gold); }
.history-score.low { background: rgba(249,96,96,0.2); color: var(--red); }

/* EMPTY STATE */
.empty-state {
  text-align:center;
  padding: 3rem 2rem;
}

.empty-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

.empty-state h3 {
  font-family: 'Unbounded', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.empty-state p {
  color: var(--text2);
}
</style>
</head>

// Копируем недостающие переводы для kz и en (для краткости используем ru как fallback)
for (let lang of ['kz','en']) {
  for (let key in I18N.ru) {
    if (!I18N[lang][key]) I18N[lang][key] = I18N.ru[key];
  }
}

// =================== STATE ===================
let currentLang = 'ru';
let testHistory = JSON.parse(localStorage.getItem('testHistory') || '[]');
let chatSessionCount = parseInt(localStorage.getItem('chatSessions') || '0');

// SUBJECTS
const SUBJECTS = [
  { id:'math', emoji:'📐', name:{ru:'Математика', kz:'Математика', en:'Mathematics'} },
  { id:'history', emoji:'📜', name:{ru:'История Казахстана', kz:'Қазақстан тарихы', en:'Kazakhstan History'} },
  { id:'biology', emoji:'🧬', name:{ru:'Биология', kz:'Биология', en:'Biology'} },
  { id:'chemistry', emoji:'⚗️', name:{ru:'Химия', kz:'Химия', en:'Chemistry'} },
  { id:'physics', emoji:'⚛️', name:{ru:'Физика', kz:'Физика', en:'Physics'} },
  { id:'geography', emoji:'🌍', name:{ru:'География', kz:'География', en:'Geography'} },
  { id:'kazakh', emoji:'🇰🇿', name:{ru:'Казахский язык', kz:'Қазақ тілі', en:'Kazakh Language'} },
  { id:'literature', emoji:'📚', name:{ru:'Литература', kz:'Әдебиет', en:'Literature'} }
];

// =================== LANG ===================
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['kz','ru','en'][i] === lang);
  });
  applyTranslations();
  renderProgress();
}

function applyTranslations() {
  const t = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
}

// =================== PROGRESS FUNCTIONS ===================
function renderProgress() {
  const history = testHistory;
  const totalTests = history.length;
  const avgScore = totalTests > 0 ? Math.round(history.reduce((a,b)=>a+b.pct,0)/totalTests) : 0;
  const totalQ = history.reduce((a,b)=>a+b.total,0);
  const totalTestsEl = document.getElementById('total-tests');
  const avgScoreEl = document.getElementById('avg-score');
  const totalQuestionsEl = document.getElementById('total-questions');
  const chatSessionsEl = document.getElementById('chat-sessions');
  if (totalTestsEl) totalTestsEl.textContent = totalTests;
  if (avgScoreEl) avgScoreEl.textContent = avgScore+'%';
  if (totalQuestionsEl) totalQuestionsEl.textContent = totalQ;
  if (chatSessionsEl) chatSessionsEl.textContent = chatSessionCount;
  const spList = document.getElementById('subject-progress-list');
  if (spList) {
    if (totalTests === 0) spList.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><h3>${I18N[currentLang].no_data || 'Пока нет данных'}</h3><p>${I18N[currentLang].first_test || 'Пройди первый тест!'}</p></div>`;
    else {
      const subjStats = {};
      history.forEach(h => { h.subjects.forEach(sid => { if (!subjStats[sid]) subjStats[sid] = {tests:0}; subjStats[sid].tests++; }); });
      spList.innerHTML = SUBJECTS.map(s => { const st = subjStats[s.id]; const testCount = st ? st.tests : 0; return `<div class="subject-progress-item"><span class="subject-progress-emoji">${s.emoji}</span><div class="subject-progress-info"><div class="subject-progress-name">${s.name[currentLang]}</div><div class="subject-progress-bar-bg"><div class="subject-progress-bar-fill" style="width:${Math.min(100, testCount * 20)}%"></div></div></div><span class="subject-progress-pct">${testCount} ${I18N[currentLang].stat_tests ? I18N[currentLang].stat_tests.toLowerCase() : 'тестов'}</span></div>`; }).join('');
    }
  }
  const histEl = document.getElementById('test-history');
  if (histEl) {
    if (history.length === 0) histEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><h3>${I18N[currentLang].no_history || 'Нет истории'}</h3><p>${I18N[currentLang].first_test || 'Пройди первый тест!'}</p></div>`;
    else {
      histEl.innerHTML = history.slice(0,8).map(h => { const cls = h.pct >= 75 ? 'good' : h.pct >= 50 ? 'mid' : 'low'; const subjs = h.subjects.map(sid => SUBJECTS.find(s=>s.id===sid)?.emoji||'').join(''); return `<div class="history-item"><span class="history-emoji">${subjs||'📝'}</span><div class="history-info"><div class="history-name">${h.correct}/${h.total} правильно</div><div class="history-date">${h.date}</div></div><span class="history-score ${cls}">${h.pct}%</span></div>`; }).join('');
    }
  }
}

// =================== INIT ===================
window.addEventListener('DOMContentLoaded', () => {
  applyTranslations();
  renderProgress();
});
</script>
